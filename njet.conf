# njet.conf
worker_processes  auto;
events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # 1. HTTP 跳转 HTTPS
    server {
        listen 80;
        server_name llmtamer.com;

        # Let's Encrypt 验证路径
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. HTTPS 服务 (双证书配置：国际 RSA + 国密 SM2)
    server {
        listen 443 ssl;
        server_name llmtamer.com;

        # --- [国际 RSA 证书] ---
        ssl_certificate     /etc/letsencrypt/live/llmtamer.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/llmtamer.com/privkey.pem;

        # --- [国密 SM2 证书配置 (可选)] ---
        # 如果你有专门的国密证书，OpenNJet 允许同时配置
        # ssl_certificate_sm2     /etc/ssl/guomi/server_sign.crt;
        # ssl_certificate_key_sm2 /etc/ssl/guomi/server_sign.key;
        
        # 协议与加密套件优化
        ssl_protocols TLSv1.2 TLSv1.3;
        # 增加国密密码套件支持 (OpenNJet 特有)
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECC-SM2-SM4-GCM-SM3:ECC-SM2-SM4-CBC-SM3;
        ssl_prefer_server_ciphers on;

        # 前端静态资源
        location / {
            root   /usr/share/njet/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 后端 API 代理
        location /api {
            proxy_pass http://llm-backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}